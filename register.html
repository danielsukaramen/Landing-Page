<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - videobelajar</title>
</head>
<body>
    <div>
        <img src="image/Logo.svg" alt="Logo videobelajar">
        
        <h2>Pendaftaran Akun</h2>

        <form>
            <div>
                <label for="name">Nama Lengkap</label>
                <input type="text" id="name" placeholder="Masukkan nama lengkap Anda" name="name" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Masukkan email Anda" name="email" required>
            </div>
            <div>
                <label for="phone">No.HP</label>
                <input type="tel" id="phone" placeholder="Masukkan nomor HP Anda" name="phone" required>
            </div>
            <div>
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan kata sandi Anda" name="password" required>
            </div>
            <div>
                <label for="confirm_password">Konfirmasi Kata Sandi</label>
                <input type="password" id="confirm_password" placeholder="Konfirmasi kata sandi Anda" name="confirm_password" required>
            </div>

            <button type="submit">Daftar</button>
            <button type="button">Masuk</button>

            <hr> <button type="button">Daftar dengan Google</button>
        </form>
    </div>

</body>
</html>
