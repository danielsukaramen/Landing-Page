<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - videobelajar</title>
</head>
<body>
    <img src="image/Logo.svg" alt="Logo videobelajar">

    <h2>Masuk ke Akun Anda</h2>

    <form> 
        <div>
            <label for="email">Email</label> 
            <input type="email" id="email" placeholder="Masukkan email Anda" name="email" required>
        </div>
        <div>
            <label for="password">Kata Sandi</label>
            <input type="password" id="password" placeholder="Masukkan kata sandi Anda" name="password" required>
        </div>

        <p>
            <a href="about:blank" target="_blank">Lupa kata sandi?</a>
        </p>

        <button type="submit">Masuk</button>
        <button type="button">Daftar</button>

        <hr> <button type="button">Masuk dengan Google</button>
    </form>
</body>
</html>
